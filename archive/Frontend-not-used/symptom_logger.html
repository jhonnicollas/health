<script>
// ── CHIP TOGGLE ────────────────────────────────────────────────────
function toggleChip(btn) {
  const isSelected = btn.dataset.selected === 'true';
  if (isSelected) {
    btn.dataset.selected = 'false';
    btn.classList.remove('chip-selected');
    btn.classList.add('border-outline-variant','text-on-surface-variant','font-medium');
    const icon = btn.querySelector('.check-icon');
    if (icon) icon.remove();
  } else {
    btn.dataset.selected = 'true';
    btn.classList.add('chip-selected');
    btn.classList.remove('border-outline-variant','text-on-surface-variant','font-medium');
    if (!btn.querySelector('.check-icon')) {
      const icon = document.createElement('span');
      icon.className = 'material-symbols-outlined filled text-[16px] ml-auto check-icon';
      icon.style.fontVariationSettings = "'FILL' 1";
      icon.textContent = 'check_circle';
      btn.appendChild(icon);
    }
  }
  updateChipCount();
}

function updateChipCount() {
  const n = document.querySelectorAll('.symptom-chip[data-selected="true"]').length;
  const badge = document.getElementById('chip-count-badge');
  if (badge) badge.textContent = n + ' dipilih';
}

// ── BODY CHIP ──────────────────────────────────────────────────────
function toggleBodyChip(btn) {
  btn.classList.toggle('selected');
}

// ── VAS SLIDER ─────────────────────────────────────────────────────
const vasData = {
  1:  { label:'Sangat Ringan', sub:'Hampir tidak terasa',          color:'#10B981', bg:'#f0fdf4', icon:'sentiment_very_satisfied' },
  2:  { label:'Ringan',        sub:'Mudah diabaikan',              color:'#10B981', bg:'#f0fdf4', icon:'sentiment_satisfied' },
  3:  { label:'Ringan',        sub:'Terasa namun tidak mengganggu',color:'#10B981', bg:'#f0fdf4', icon:'sentiment_satisfied' },
  4:  { label:'Sedang',        sub:'Sedikit mengganggu',           color:'#F59E0B', bg:'#fffbeb', icon:'sentiment_neutral' },
  5:  { label:'Sedang',        sub:'Cukup mengganggu',             color:'#F59E0B', bg:'#fffbeb', icon:'sentiment_neutral' },
  6:  { label:'Sedang',        sub:'Mengganggu beberapa aktivitas',color:'#D97706', bg:'#fffbeb', icon:'sentiment_dissatisfied' },
  7:  { label:'Berat',         sub:'Mengganggu aktivitas utama',   color:'#EF4444', bg:'#fef2f2', icon:'warning' },
  8:  { label:'Berat',         sub:'Sulit beraktivitas',           color:'#EF4444', bg:'#fef2f2', icon:'warning' },
  9:  { label:'Sangat Berat',  sub:'Tidak bisa beraktivitas',      color:'#ba1a1a', bg:'#fef2f2', icon:'emergency' },
  10: { label:'Tidak Tertahankan', sub:'Butuh bantuan segera',     color:'#7f1d1d', bg:'#fef2f2', icon:'emergency' },
};

function updateVAS(val) {
  const v = parseInt(val);
  const d = vasData[v] || vasData[7];
  document.getElementById('vas-num').textContent = v;
  document.getElementById('vas-main-label').textContent = d.label;
  document.getElementById('vas-main-label').style.color = d.color;
  document.getElementById('vas-sub-label').textContent = '\u2014 ' + d.sub;
  document.getElementById('vas-label-box').style.background = d.bg;
  document.getElementById('vas-icon').textContent = d.icon;
  document.getElementById('vas-icon').style.color = d.color;
  // Circle color
  const circle = document.getElementById('vas-circle');
  if (v <= 3) circle.style.background = 'linear-gradient(135deg,#10B981,#059669)';
  else if (v <= 6) circle.style.background = 'linear-gradient(135deg,#F59E0B,#D97706)';
  else circle.style.background = 'linear-gradient(135deg,#EF4444,#ba1a1a)';
  // Thumb color
  const slider = document.getElementById('vas-slider');
  slider.style.setProperty('--thumb-border', d.color);
}

// ── MOOD ────────────────────────────────────────────────────────────
function selectMood(btn, emoji, label, color, bg) {
  document.querySelectorAll('.mood-btn .mood-inner').forEach(el => {
    el.style.boxShadow = '';
    el.style.transform = '';
    el.style.background = '';
  });
  const inner = btn.querySelector('.mood-inner');
  inner.style.background = bg;
  inner.style.boxShadow = '0 0 0 2.5px ' + color;
  inner.style.transform = 'scale(1.18)';
  const lbl = document.getElementById('mood-label');
  lbl.textContent = emoji + ' ' + label;
  lbl.style.color = color;
}

// ── CHAR COUNTER ────────────────────────────────────────────────────
function updateCharCount(ta) {
  const len = ta.value.length;
  const el = document.getElementById('char-counter');
  el.textContent = len + ' / 500';
  el.style.color = len > 450 ? '#D97706' : '';
}

// ── REPORTS SUBNAV ──────────────────────────────────────────────────
function toggleReports() {
  const sub = document.getElementById('reports-sub');
  const chev = document.getElementById('reports-chevron');
  sub.classList.toggle('hidden');
  chev.textContent = sub.classList.contains('hidden') ? 'expand_more' : 'expand_less';
}

// ── HISTORY PANEL ───────────────────────────────────────────────────
function toggleHistory() {
  const panel = document.getElementById('history-panel');
  const chev = document.getElementById('history-chevron');
  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  chev.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
}

// ── EMERGENCY MODAL ─────────────────────────────────────────────────
function showEmergencyModal() {
  const modal = document.getElementById('emergency-modal');
  modal.style.display = 'flex';
  modal.style.opacity = '0';
  requestAnimationFrame(() => {
    modal.style.transition = 'opacity 0.25s ease';
    modal.style.opacity = '1';
  });
}

function dismissEmergencyModal() {
  const modal = document.getElementById('emergency-modal');
  modal.style.transition = 'opacity 0.25s ease';
  modal.style.opacity = '0';
  setTimeout(() => { modal.style.display = 'none'; }, 260);
}
<\/script>
